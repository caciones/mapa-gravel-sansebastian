<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<title>Rotas Gravel – San Sebastián</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet GPX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<!-- Leaflet Elevation -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.css"/>
<script src="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
  }

  /* Container geral */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Mapa em formato quadrado */
  .map-wrapper {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 2px solid #ccc;
    margin-bottom: 20px;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Tabela */
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: left;
  }

  th {
    background: #eee;
  }

  .rota1 { color: green; font-weight: bold; }
  .rota2 { color: orange; font-weight: bold; }
  .rota3 { color: blue; font-weight: bold; }

  .legend {
    background: white;
    padding: 8px;
    font-size: 13px;
    line-height: 18px;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
  }

  .legend i {
    width: 14px;
    height: 14px;
    float: left;
    margin-right: 6px;
  }
</style>
</head>

<body>
<div class="container">

  <!-- MAPA -->
  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- TABELA DE ROTAS -->
  <table>
    <thead>
      <tr>
        <th>Rota</th>
        <th>Descrição</th>
        <th>GPX / Links</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="rota1">🟢 Rota 1</td>
        <td>San Sebastián → Logroño (≈ 350–370 km)</td>
        <td>
          <a href="gpx/rota1.gpx" target="_blank">GPX</a> |
          <a href="https://www.komoot.com" target="_blank">Komoot</a> |
          <a href="https://www.wikiloc.com" target="_blank">Wikiloc</a>
        </td>
      </tr>
      <tr>
        <td class="rota2">🟠 Rota 2</td>
        <td>Costa Basca + Gorbea → Vitoria (≈ 320 km)</td>
        <td>
          <a href="gpx/rota2.gpx" target="_blank">GPX</a> |
          <a href="https://www.komoot.com" target="_blank">Komoot</a>
        </td>
      </tr>
      <tr>
        <td class="rota3">🔵 Rota 3</td>
        <td>País Basco → França (SJPP) (≈ 330–350 km)</td>
        <td>
          <a href="gpx/rota3.gpx" target="_blank">GPX</a> |
          <a href="https://www.wikiloc.com" target="_blank">Wikiloc</a>
        </td>
      </tr>
    </tbody>
  </table>

</div>

<script>
/* =========================
   MAPA BASE
========================= */
var map = L.map("map").setView([43.0, -2.0], 8);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* =========================
   PERFIL DE ELEVAÇÃO
========================= */
var elevation = L.control.elevation({
  position: "bottomleft",
  width: 300,
  height: 120,
  theme: "steelblue-theme"
}).addTo(map);

/* =========================
   GRUPOS DE ROTAS
========================= */
var r1 = L.layerGroup().addTo(map);
var r2 = L.layerGroup().addTo(map);
var r3 = L.layerGroup().addTo(map);

/* =========================
   FUNÇÃO GPX
========================= */
function loadGPX(url, color, name, group) {
  new L.GPX(url, {
    async: true,
    polyline_options: { color: color, weight: 4 }
  }).on("loaded", function(e) {
    elevation.clear();
    elevation.addData(e.target);

    e.target.bindPopup("<b>" + name + "</b>");
  }).addTo(group);
}

/* =========================
   CARREGAR ROTAS
========================= */
loadGPX("gpx/rota1.gpx", "green", "Rota 1 – San Sebastián → Logroño", r1);
loadGPX("gpx/rota2.gpx", "orange", "Rota 2 – Costa + Gorbea → Vitoria", r2);
loadGPX("gpx/rota3.gpx", "blue", "Rota 3 – País Basco → França", r3);

/* =========================
   CONTROLOS
========================= */
L.control.layers(null, {
  "🟢 Rota 1": r1,
  "🟠 Rota 2": r2,
  "🔵 Rota 3": r3
}, { collapsed: false }).addTo(map);

/* =========================
   LEGENDA
========================= */
var legend = L.control({ position: "bottomright" });
legend.onAdd = function () {
  var div = L.DomUtil.create("div", "legend");
  div.innerHTML =
    "<b>Rotas</b><br>" +
    "<i style='background:green'></i> Rota 1<br>" +
    "<i style='background:orange'></i> Rota 2<br>" +
    "<i style='background:blue'></i> Rota 3";
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
