<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<title>Rotas Gravel – San Sebastián</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-top: 0;
  }

  /* MAPA */
  #map {
    width: 100%;
    height: 500px;
    border: 2px solid #ccc;
  }

  /* CAIXA DE LEGENDA + LINKS */
  .info-box {
    margin-top: 15px;
    padding: 15px;
    background: white;
    border: 2px solid #ccc;
  }

  .rota {
    margin-bottom: 12px;
  }

  .rota span {
    font-weight: bold;
  }

  .cor {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 8px;
    vertical-align: middle;
  }

  a {
    color: #0645ad;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>
<div class="container">

<h1>Rotas Gravel a partir de San Sebastián</h1>

<!-- MAPA -->
<div id="map"></div>

<!-- LEGENDA + LINKS (RETÂNGULO) -->
<div class="info-box">

  <div class="rota">
    <span>
      <span class="cor" style="background:green"></span>
      Rota 1 – San Sebastián → Logroño
    </span><br>
    <a href="https://www.komoot.com/guide/3495055/gravel-biking-around-donostia-san-sebastian" target="_blank">Komoot</a> |
    <a href="https://www.wikiloc.com/trails/gravel-bike/spain/basque-country/san-sebastian" target="_blank">Wikiloc</a> |
    <a href="https://bikepacking.com/routes/basque-bikepacking-vuelta-de-vasco/" target="_blank">Bikepacking</a>
  </div>

  <div class="rota">
    <span>
      <span class="cor" style="background:orange"></span>
      Rota 2 – Costa + Gorbea → Vitoria
    </span><br>
    <a href="https://bikepacking.com/routes/basque-bikepacking-vuelta-de-vasco/" target="_blank">Bikepacking</a> |
    <a href="https://www.baskme.com/hiking-tours/basque-countryside-grave-bike-tour/" target="_blank">BaskMe</a>
  </div>

  <div class="rota">
    <span>
      <span class="cor" style="background:blue"></span>
      Rota 3 – País Basco → França (SJPP)
    </span><br>
    <a href="https://bikepacking.com/routes/basque-bikepacking-vuelta-de-vasco/" target="_blank">Bikepacking</a> |
    <a href="https://www.wikiloc.com" target="_blank">Wikiloc</a>
  </div>

</div>

</div>

<script>
/* =========================
   MAPA BASE
========================= */
var map = L.map("map").setView([43.0, -2.0], 8);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* =========================
   DADOS DAS ROTAS
========================= */
var rota1 = [
  [-1.98, 43.32, "San Sebastián"],
  [-1.90, 43.05, "Andoain"],
  [-1.75, 42.95, "Leitza"],
  [-1.88, 42.92, "Lekunberri"],
  [-2.15, 42.85, "Urbasa"],
  [-2.67, 42.85, "Vitoria-Gasteiz"],
  [-2.45, 42.47, "Logroño"]
];

var rota2 = [
  [-1.98, 43.32, "San Sebastián"],
  [-2.25, 43.30, "Zumaia"],
  [-2.50, 43.18, "Markina-Xemein"],
  [-2.93, 43.26, "Bilbao"],
  [-2.72, 43.02, "Areatza (Gorbea)"],
  [-2.67, 42.85, "Vitoria-Gasteiz"]
];

var rota3 = [
  [-1.98, 43.32, "San Sebastián"],
  [-1.79, 43.35, "Hondarribia"],
  [-1.47, 43.49, "Bayonne"],
  [-1.45, 43.31, "Espelette"],
  [-1.24, 43.16, "Saint-Jean-Pied-de-Port"]
];

/* =========================
   FUNÇÃO PARA DESENHAR ROTAS
========================= */
function desenharRota(pontos, cor) {
  var latlngs = pontos.map(p => [p[1], p[0]]);

  L.polyline(latlngs, {
    color: cor,
    weight: 4
  }).addTo(map);

  pontos.forEach(p => {
    L.circleMarker([p[1], p[0]], {
      radius: 5,
      color: cor,
      fillOpacity: 0.8
    })
    .bindPopup(p[2])
    .addTo(map);
  });
}

/* =========================
   DESENHAR NO MAPA
========================= */
desenharRota(rota1, "green");
desenharRota(rota2, "orange");
desenharRota(rota3, "blue");
</script>

</body>
</html>
