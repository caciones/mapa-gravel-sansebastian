<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<title>Mapa Interativo – Rotas Gravel desde San Sebastián</title>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet GPX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<!-- Leaflet Elevation -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.css"
/>
<script src="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  #map {
    height: 100vh;
    width: 100vw;
  }

  .legend {
    background: white;
    padding: 10px;
    font-size: 13px;
    line-height: 18px;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
  }

  .legend i {
    width: 14px;
    height: 14px;
    float: left;
    margin-right: 8px;
    opacity: 0.9;
  }
</style>
</head>

<body>
<div id="map"></div>

<script>
/* =========================
   MAPA BASE
========================= */
var map = L.map("map").setView([43.0, -2.0], 8);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* =========================
   PERFIL DE ELEVAÇÃO
========================= */
var elevationControl = L.control.elevation({
  position: "bottomleft",
  theme: "steelblue-theme",
  width: 420,
  height: 160,
  margins: { top: 10, right: 20, bottom: 30, left: 50 },
  useHeightIndicator: true,
  interpolation: "linear",
  hoverNumber: {
    decimalsX: 1, // km
    decimalsY: 0  // metros
  }
}).addTo(map);

/* =========================
   GRUPOS DE ROTAS
========================= */
var rota1Layer = L.layerGroup();
var rota2Layer = L.layerGroup();
var rota3Layer = L.layerGroup();

/* =========================
   FUNÇÃO AUXILIAR GPX
========================= */
function carregarGPX(url, cor, nomeRota, layerGroup) {
  return new L.GPX(url, {
    async: true,
    polyline_options: {
      color: cor,
      weight: 4
    }
  })
  .on("loaded", function(e) {
    var km = (e.target.get_distance() / 1000).toFixed(1);

    e.target.bindPopup(
      "<b>" + nomeRota + "</b><br>" +
      "Distância total: <b>" + km + " km</b>"
    );

    elevationControl.clear();
    elevationControl.addData(e.target);
  })
  .addTo(layerGroup);
}

/* =========================
   GPX DAS ROTAS
   👉 SUBSTITUI OS LINKS
========================= */

// 🟢 ROTA 1
carregarGPX(
  "https://SEU_LINK_GPXX_AQUI/rota1_sansebastian_logrono.gpx",
  "green",
  "Rota 1 – San Sebastián → Logroño",
  rota1Layer
);

// 🟠 ROTA 2
carregarGPX(
  "https://SEU_LINK_GPXX_AQUI/rota2_costa_gorbea_vitoria.gpx",
  "orange",
  "Rota 2 – Costa + Gorbea → Vitoria",
  rota2Layer
);

// 🔵 ROTA 3
carregarGPX(
  "https://SEU_LINK_GPXX_AQUI/rota3_franca_sjpp.gpx",
  "blue",
  "Rota 3 – País Basco → França (SJPP)",
  rota3Layer
);

/* =========================
   CONTROLOS LIGAR/DESLIGAR
========================= */
var overlays = {
  "🟢 Rota 1 – San Sebastián → Logroño": rota1Layer,
  "🟠 Rota 2 – Costa + Gorbea → Vitoria": rota2Layer,
  "🔵 Rota 3 – País Basco → França": rota3Layer
};

L.control.layers(null, overlays, {
  collapsed: false
}).addTo(map);

// Ativar todas por defeito
rota1Layer.addTo(map);
rota2Layer.addTo(map);
rota3Layer.addTo(map);

/* =========================
   ATUALIZAR PERFIL AO MUDAR ROTA
========================= */
map.on("overlayadd", function(e) {
  elevationControl.clear();
  e.layer.eachLayer(function(layer) {
    if (layer instanceof L.GPX) {
      elevationControl.addData(layer);
    }
  });
});

/* =========================
   LEGENDA FIXA
========================= */
var legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  var div = L.DomUtil.create("div", "legend");
  div.innerHTML =
    "<b>Rotas Gravel</b><br>" +
    "<i style='background:green'></i> San Sebastián → Logroño<br>" +
    "<i style='background:orange'></i> Costa + Gorbea → Vitoria<br>" +
    "<i style='background:blue'></i> País Basco → França (SJPP)";
  return div;
};

legend.addTo(map);
</script>
</body>
</html>
